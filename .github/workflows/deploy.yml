name: Deploy to cPanel

# FTP deploy for cPanel shared hosting with no SSH access.
#
# Required repository secrets:
#   FTP_SERVER    e.g. ftp.your-domain.example
#   FTP_USERNAME
#   FTP_PASSWORD
#   DEPLOY_TOKEN  (optional) — must match DEPLOY_TOKEN in the production .env
# Required repository variable:
#   DEPLOY_URL    (optional) — site root, e.g. https://your-domain.example
#
# Deploy layout produced on the subdomain root:
#   index.php   ← custom bootstrap → ./laravel/...
#   .htaccess   ← Laravel public .htaccess (URL rewrites)
#   build/, favicon.ico, robots.txt ...
#   laravel/    ← Laravel app, locked down by .htaccess

# Intentionally manual-only: this template has no deployment target configured
# yet. Switch back to `push: branches: [main]` when you're ready to deploy.
on:
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest

        # The `secrets` context can't be referenced in `if:` conditions, so the
        # token is exposed as an env var and the migrate step checks `env` below.
        env:
            DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP 8.3
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite3, bcmath, soap, intl, gd, exif, iconv, fileinfo
                  coverage: none

            - name: Install PHP dependencies (production)
              run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Publish Filament assets
              run: php artisan filament:assets

            - name: Install Node dependencies and build assets
              run: |
                  npm ci
                  npm run build

            - name: Assemble deploy directory
              run: |
                  set -e
                  rm -rf deploy
                  mkdir -p deploy/laravel

                  # 1. Copy every Laravel file EXCEPT public/ into deploy/laravel/.
                  rsync -a \
                      --exclude='public' \
                      --exclude='deploy' \
                      --exclude='.git*' \
                      --exclude='.github' \
                      --exclude='tests' \
                      --exclude='node_modules' \
                      --exclude='.env' \
                      --exclude='.env.*' \
                      --exclude='CLAUDE.md' \
                      --exclude='phpunit.xml' \
                      --exclude='.phpunit.result.cache' \
                      --exclude='storage/logs/*.log' \
                      --exclude='storage/framework/cache/data/*' \
                      --exclude='storage/framework/sessions/*' \
                      --exclude='storage/framework/views/*' \
                      --exclude='database/database.sqlite' \
                      ./ deploy/laravel/

                  # 2. Copy public/ contents into deploy/ root (subdomain root).
                  cp -a public/. deploy/

                  # 3. Replace public index.php with the custom bootstrap that
                  #    points at the sibling laravel/ folder.
                  cp .github/deploy/index.php deploy/index.php

                  # 4. Drop in the lockdown .htaccess inside laravel/.
                  cp .github/deploy/laravel-htaccess deploy/laravel/.htaccess

                  echo "===== deploy/ contents ====="
                  ls -la deploy/

            - name: FTP Deploy
              uses: SamKirkland/FTP-Deploy-Action@v4.3.5
              with:
                  server: ${{ secrets.FTP_SERVER }}
                  username: ${{ secrets.FTP_USERNAME }}
                  password: ${{ secrets.FTP_PASSWORD }}
                  protocol: ftp
                  port: 21
                  server-dir: /
                  local-dir: ./deploy/
                  state-name: .ftp-deploy-sync-state.json

            # Runs new migrations via the deploy hook (routes/web.php → /_deploy/migrate).
            # Skipped unless both DEPLOY_TOKEN (secret) and DEPLOY_URL (variable) are set.
            - name: Run database migrations
              if: ${{ env.DEPLOY_TOKEN != '' && vars.DEPLOY_URL != '' }}
              env:
                  DEPLOY_URL: ${{ vars.DEPLOY_URL }}
              run: |
                  echo "Waiting 15s for FTP to settle..."
                  sleep 15
                  curl -fsS -X POST \
                      -H "X-Deploy-Token: $DEPLOY_TOKEN" \
                      -w "\nHTTP %{http_code}\n" \
                      "$DEPLOY_URL/_deploy/migrate"
