name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
#
# The job runs the test suite first, then creates a GitHub release with
# auto-generated release notes pulled from merged PRs and commits.
# No FTP deploy — this is for template versioning only.

on:
    push:
        tags:
            - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP 8.3
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite3, bcmath
                  coverage: none

            - name: Install PHP dependencies
              run: composer install --prefer-dist --no-interaction

            - name: Prepare test environment
              run: |
                  cp .env.example .env
                  php artisan key:generate
                  touch database/database.sqlite

            - name: Run test suite
              run: php artisan test

            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
