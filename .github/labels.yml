# Label set for the repository, synced by .github/workflows/labels.yml.
# Colours are hex without the leading '#'.

# --- Type ---
- name: bug
  color: d73a4a
  description: Something isn't working
- name: enhancement
  color: a2eeef
  description: New feature or request
- name: documentation
  color: 0075ca
  description: Improvements or additions to documentation
- name: dependencies
  color: 0366d6
  description: Stack or dependency upgrades
- name: breaking change
  color: b60205
  description: Introduces a backwards-incompatible change
- name: security
  color: ee0701
  description: Security-related issue or fix
- name: chore
  color: fef2c0
  description: Tooling, CI, or housekeeping

# --- Triage / workflow ---
- name: good first issue
  color: 7057ff
  description: Good for newcomers
- name: help wanted
  color: 008672
  description: Extra attention is wanted
- name: question
  color: d876e3
  description: Further information is requested
- name: needs triage
  color: ededed
  description: Awaiting maintainer review
- name: duplicate
  color: cfd3d7
  description: This issue or PR already exists
- name: wontfix
  color: ffffff
  description: This will not be worked on
